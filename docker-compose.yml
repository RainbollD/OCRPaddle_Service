# Three independent OCR backends. Start ONE at a time (16 GB VRAM holds one
# model), e.g.:  docker compose up deepseek-ocr
# Then run the CLI against it:  python client/cli.py deepseek-ocr data/scan.pdf
#
# Each service publishes its vLLM OpenAI-compatible API on the host:
#   deepseek-ocr :8001   hunyuan-ocr :8002   qwen3-vl-8b :8003
services:
  deepseek-ocr:
    build:
      context: ./backends/deepseek-ocr
      dockerfile: Dockerfile
    image: ocr-backend-deepseek:latest
    container_name: ocr-deepseek
    ports:
      - "8001:8001"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  hunyuan-ocr:
    build:
      context: ./backends/hunyuan-ocr
      dockerfile: Dockerfile
    image: ocr-backend-hunyuan:latest
    container_name: ocr-hunyuan
    ports:
      - "8002:8002"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qwen3-vl-8b:
    build:
      context: ./backends/qwen3-vl-8b
      dockerfile: Dockerfile
    image: ocr-backend-qwen3-vl-8b:latest
    container_name: ocr-qwen3-vl-8b
    ports:
      - "8003:8003"
    environment:
      HF_HOME: /root/.cache/huggingface
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    volumes:
      - hf-cache:/root/.cache/huggingface
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  hf-cache:
